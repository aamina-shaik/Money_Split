<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Split — Couples Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <div class="header">
      <div class="header-eyebrow">Couples Expense Tracker</div>
      <h1>Split <em>with</em> Love</h1>
      <div class="header-divider"><span>♥</span></div>
    </div>


    <div class="balance-card">
      <div class="balance-eyebrow">Running Balance</div>
      <div class="balance-amount even" id="balance-amount">₹0.00</div>
      <div class="balance-desc" id="balance-desc">Add your first expense below</div>
    </div>
    <div class="totals-row">
      <div class="total-pill p1">
        <div class="total-pill-label">Paid by</div>
        <div class="total-pill-name" id="p1-name-label">Alex</div>
        <div class="total-pill-amount" id="p1-total">₹0.00</div>
      </div>
      <div class="total-pill p2">
        <div class="total-pill-label">Paid by</div>
        <div class="total-pill-name" id="p2-name-label">Sam</div>
        <div class="total-pill-amount" id="p2-total">₹0.00</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Partners</div>
      <div class="names-grid">
        <div class="field-group p1">
          <label>Partner 1</label>
          <input type="text" id="p1-name-input" value="Alex" maxlength="18" autocomplete="off" />
        </div>
        <div class="field-group p2">
          <label>Partner 2</label>
          <input type="text" id="p2-name-input" value="Sam" maxlength="18" autocomplete="off" />
        </div>
      </div>
    </div>

    <div class="add-card">
      <div class="card-title">Add Expense</div>
      <div class="add-fields">
        <input type="text" id="desc-input" placeholder="What was it for?" maxlength="45" autocomplete="off" />
        <input type="number" id="amount-input" placeholder="₹ Amount" min="0" step="0.01" />
      </div>
      <div class="add-bottom">
        <select id="payer-select">
          <option value="p1">Alex paid</option>
          <option value="p2">Sam paid</option>
        </select>
        <button class="add-btn" onclick="addExpense()">+ Add</button>
      </div>
    </div>

    <div class="log-header">
      <div class="log-title-text">Expense Log</div>
      <button class="clear-btn" onclick="clearAll()">Clear all</button>
    </div>

    <div class="expense-list" id="expense-list">
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <div class="empty-text">No expenses yet — add one above</div>
      </div>
    </div>

    <div class="footer">Made with <span>♥</span> for two</div>

  </div>

  <script src="script.js"></script>
</body>

</html>
